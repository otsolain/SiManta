name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package Teacher
        run: |
          mkdir dist\teacher
          copy build\teacher\Release\SiMantaTeacher.exe dist\teacher\
          windeployqt dist\teacher\SiMantaTeacher.exe --release --no-translations

      - name: Package Student
        run: |
          mkdir dist\student
          copy build\student\Release\SiMantaStudent.exe dist\student\
          windeployqt dist\student\SiMantaStudent.exe --release --no-translations

      - name: Copy Logo
        run: |
          copy installer\logo.ico dist\teacher\logo.ico
          copy installer\logo.ico dist\student\logo.ico

      - name: Create ZIP Archives
        run: |
          cd dist
          Compress-Archive -Path teacher\* -DestinationPath ..\SiManta-Teacher.zip
          Compress-Archive -Path student\* -DestinationPath ..\SiManta-Student.zip
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SiManta-Binaries
          path: |
            SiManta-Teacher.zip
            SiManta-Student.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SiManta-Teacher.zip
            SiManta-Student.zip
          generate_release_notes: true
