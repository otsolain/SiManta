name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  QT_VERSION: '6.7.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: true

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "NMake Makefiles"

    - name: Build
      run: cmake --build build --config Release

    - name: Create Teacher distribution
      shell: bash
      run: |
        mkdir -p dist/teacher
        cp build/teacher/lab-teacher.exe dist/teacher/

    - name: Create Student distribution
      shell: bash
      run: |
        mkdir -p dist/student
        cp build/student/lab-student.exe dist/student/

    - name: Deploy Qt DLLs - Teacher
      run: |
        windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler dist/teacher/lab-teacher.exe

    - name: Deploy Qt DLLs - Student
      run: |
        windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler dist/student/lab-student.exe

    - name: Upload Teacher Console
      uses: actions/upload-artifact@v4
      with:
        name: LabMonitor-Teacher-Windows
        path: dist/teacher/
        retention-days: 90

    - name: Upload Student Agent
      uses: actions/upload-artifact@v4
      with:
        name: LabMonitor-Student-Windows
        path: dist/student/
        retention-days: 90
